name: CI/CD And Container Pipeline
run-name: Deploy by @${{ github.actor }}

on:
  workflow_dispatch:

jobs:
  ci:
    name: CI Workflow
    uses: ./.github/workflows/ci.yml
    secrets:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}

  container:
    name: Container
    uses: ./.github/workflows/container.yml
    secrets:
      DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
      DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}

  cd:
    name: CD
    needs:
      - ci
    uses: ./.github/workflows/cd.yml
    secrets:
      SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
      APP_KEY: ${{ secrets.APP_KEY }}
      DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
      PRIVATE_KEY_PAGAR_ME: ${{ secrets.PRIVATE_KEY_PAGAR_ME }}
      ALLOWED_IPS_PAGAR_ME: ${{ secrets.ALLOWED_IPS_PAGAR_ME }}
      MAIL_PASSWORD: ${{ secrets.MAIL_PASSWORD }}
      KUBE_CONFIG: ${{ secrets.KUBE_CONFIG }}
      BASE_URL_API_WEGIA: ${{ secrets.BASE_URL_API_WEGIA }}
      BASE_URL_API_WEGIA_PATH: ${{ secrets.BASE_URL_API_WEGIA_PATH }}
      BASE_URL_API_PAGAR_ME: ${{ secrets.BASE_URL_API_PAGAR_ME }}
      PUBLIC_KEY_PAGAR_ME: ${{ secrets.PUBLIC_KEY_PAGAR_ME }}
      BASE_URL_API_CEP: ${{ secrets.BASE_URL_API_CEP }}

  notification:
    name: Notification
    runs-on: ubuntu-latest
    needs: cd
    if: always()
    steps:
      - name: Send Notification
        run: |
          if [ "${{ needs.cd.result }}" = "success" ]; then
            echo "✅ Pipeline finalizado com SUCESSO! Aplicação no ar."
          else
            echo "❌ O pipeline FALHOU! Verifique os logs."
            exit 1
          fi
