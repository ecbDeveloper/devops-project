services:
  api:
    container_name: api
    build:
      context: ./api
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - 8000:80
    volumes:
      - ./api/wegia:/var/www/html
    networks:
      - wegia-network
    depends_on:
      - db

  db:
    image: mariadb:10.11
    container_name: db
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: secret
      MYSQL_DATABASE: wegia
      MYSQL_USER: wegiauser
      MYSQL_PASSWORD: senha  
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - wegia-network

  docs:
    image: python:3.12-slim
    container_name: mkdocs-dev
    working_dir: /app
    ports:
      - "8010:8000"
    volumes:
      - ./docs:/app/docs
      - ./mkdocs.yml:/app/mkdocs.yml
    networks:
      - wegia-network
    command: >
      sh -c "pip install --no-cache-dir mkdocs==1.6.1 mkdocs-material==9.6.21 mkdocs-material-extensions==1.3.1 && mkdocs serve -a 0.0.0.0:8000 --livereload"

volumes:
  db_data:

networks:
  wegia-network:
    driver: bridge