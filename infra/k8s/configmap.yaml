apiVersion: v1
kind: ConfigMap
metadata:
  name: wegia-back-config
  namespace: wegia
data:
  APP_NAME: "Laravel"
  APP_ENV: "local"
  APP_DEBUG: "true"
  APP_URL: "http://api.wegia.local"
  APP_LOCALE: "pt_BR"
  APP_FALLBACK_LOCALE: "pt_BR"
  APP_FAKER_LOCALE: "pt_BR"
  APP_MAINTENANCE_DRIVER: "file"
  PHP_CLI_SERVER_WORKERS: "4"
  BCRYPT_ROUNDS: "12"
  LOG_CHANNEL: "stack"
  LOG_STACK: "single"
  LOG_DEPRECATIONS_CHANNEL: "null"
  LOG_LEVEL: "debug"
  DB_CONNECTION: "mariadb"
  DB_HOST: "db"
  DB_PORT: "3306"
  DB_DATABASE: "wegia"
  DB_USERNAME: "wegiauser"
  SESSION_DRIVER: "database"
  SESSION_LIFETIME: "120"
  SESSION_ENCRYPT: "false"
  SESSION_PATH: "/"
  SESSION_DOMAIN: "null"
  MAIL_MAILER: ""
  MAIL_HOST: ""
  MAIL_PORT: ""
  MAIL_USERNAME: ""
  MAIL_ENCRYPTION: ""
  MAIL_FROM_ADDRESS: ""
  MAIL_FROM_NAME: ""
  BROADCAST_CONNECTION: "log"
  FILESYSTEM_DISK: "local"
  QUEUE_CONNECTION: "database"
  CACHE_STORE: "database"
  AUTH_GUARD: "api"
  L5_SWAGGER_CONST_HOST: "http://api.wegia.local/api"


