apiVersion: apps/v1
kind: Deployment
metadata:
  name: wegia-back
  namespace: wegia
  labels:
    app: wegia-back
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: wegia-back
  template:
    metadata:
      labels:
        app: wegia-back
    spec:
      containers:
        - name: api
          image: castilhoeduardo/wegia-back:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
              name: http
          envFrom:
            - configMapRef:
                name: wegia-back-config
            - secretRef:
                name: wegia-back-secret
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 5
