apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: wegia-back-hpa
  namespace: wegia
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: wegia-back
  minReplicas: 2
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 60
