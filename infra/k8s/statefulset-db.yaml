apiVersion: v1
kind: Service
metadata:
  name: db
  namespace: wegia
  labels:
    app: mariadb
spec:
  ports:
    - port: 3306
      name: mysql
  selector:
    app: mariadb
---
apiVersion: v1
kind: Service
metadata:
  name: db-headless
  namespace: wegia
  labels:
    app: mariadb
spec:
  clusterIP: None
  ports:
    - port: 3306
      name: mysql
  selector:
    app: mariadb
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mariadb
  namespace: wegia
spec:
  serviceName: "db-headless"
  replicas: 2
  selector:
    matchLabels:
      app: mariadb
  template:
    metadata:
      labels:
        app: mariadb
    spec:
      containers:
      - name: mariadb
        image: bitnami/mariadb:latest
        env:
        - name: MARIADB_ROOT_PASSWORD
          valueFrom:
            secretKeyRef:
              name: wegia-back-secret
              key: DB_PASSWORD
        - name: MARIADB_USER
          value: "wegiauser"
        - name: MARIADB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: wegia-back-secret
              key: DB_PASSWORD
        - name: MARIADB_DATABASE
          value: "wegia"
        ports:
        - containerPort: 3306
          name: mysql
        volumeMounts:
        - name: data
          mountPath: /bitnami/mariadb
  volumeClaimTemplates:
  - metadata:
      name: data
    spec:
      accessModes: [ "ReadWriteOnce" ]
      resources:
        requests:
          storage: 1Gi
